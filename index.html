<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Rewriter AI Pro - Multi-Pass Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div class="app-container">
        <header>
            <div class="logo">
                <i class="fas fa-microchip"></i>
                <h1>Parafrase<span>Berbasis AI untuk Ayu cantik</span></h1>
            </div>
            <div class="header-actions">
                <span class="version-tag">v2.0 Multi-Tahap</span>
                <button id="themeToggle" class="btn-icon"><i class="fas fa-moon"></i></button>
            </div>
        </header>

        <main>
            <section class="card api-config">
                <div class="input-group">
                    <input type="password" id="apiKey" placeholder="Masukkan API Key Gemini...">
                    <button id="saveApiKey" class="btn-primary">Simpan API</button>
                </div>
                <div class="quota-monitor" style="margin-top: 15px; padding: 12px 15px; background: rgba(37, 99, 235, 0.06); border-radius: 10px; border: 1px solid rgba(37, 99, 235, 0.15); display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; font-family: 'Poppins', sans-serif;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <i class="fas fa-bolt" style="color: var(--primary);"></i> 
                        <span>Sisa Sesi Menit Ini: <strong id="quotaRemaining" style="color: var(--primary); font-size: 0.9rem; margin-left: 2px;">-</strong></span>
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <i class="fas fa-hourglass-half" style="color: var(--gold);"></i> 
                        <span>Status Jeda: <strong id="quotaResetTime" style="color: var(--gold); font-size: 0.9rem; margin-left: 2px;">Normal</strong></span>
                    </div>
                </div>
            </section>

            <div class="main-grid">
                <div class="grid-col">
                    <section class="card text-section-card">
                        <div class="card-header">
                            <h3><i class="fas fa-align-left text-primary"></i> Teks Asli</h3>
                            <div class="stats-pill">
                                <span id="wordCount">0 Kata</span>
                            </div>
                        </div>
                        <textarea id="inputText" placeholder="Tempel teks yang ingin diparafrase di sini (minimal 10 kata)..."></textarea>
                        
                        <div class="controls-grid">
                            <div class="control-group">
                                <label><i class="fas fa-sliders-h"></i> Mode Parafrase</label>
                                <select id="modeSelect">
                                    <option value="academic">Akademik Standar</option>
                                    <option value="maximum">Parafrase Maksimal</option>
                                    <option value="formal">Sangat Formal</option>
                                    <option value="humanize">Bahasa Lebih Natural</option>
                                </select>
                            </div>
                            <div class="control-group">
                                <label><i class="fas fa-wand-magic-sparkles"></i> Tingkat Variasi</label>
                                <select id="levelSelect">
                                    <option value="low">Rendah</option>
                                    <option value="medium" selected>Sedang</option>
                                    <option value="high">Tinggi</option>
                                </select>
                            </div>
                        </div>

                        <div class="action-buttons">
                            <button onclick="startRewrite(1)" class="btn-action btn-gradient-primary">
                                <i class="fas fa-bolt"></i> Parafrase 1x
                            </button>
                            <button onclick="startRewrite(3)" class="btn-action btn-gold">
                                <i class="fas fa-layer-group"></i> Parafrase 3 tahap
                            </button>
                            <button onclick="startRewrite(5)" class="btn-action btn-extreme">
                                <i class="fas fa-dna"></i> Mendalam 5 Tahap
                            </button>
                        </div>
                    </section>
                </div>

                <div class="grid-col">
                    <section class="card output-section text-section-card">
                        <div class="card-header">
                            <h3><i class="fas fa-magic text-success"></i> Hasil Parafrase</h3>
                            <div class="output-tools">
                                <button id="copyBtn" title="Copy"><i class="fas fa-copy"></i></button>
                                <button id="downloadBtn" title="Download"><i class="fas fa-file-download"></i></button>
                            </div>
                        </div>

                        <div id="loadingOverlay" class="hidden">
                            <div class="loader-content">
                                <div class="spinner-ring"></div>
                                <div class="progress-details">
                                    <p id="statusMain">Memulai Proses...</p>
                                    <div class="mini-progress">
                                        <div id="innerBar" class="inner-bar"></div>
                                    </div>
                                    <p id="statusStep">Menyiapkan AI...</p>
                                </div>
                            </div>
                        </div>

                        <div id="outputArea">
                            <div id="outputText" class="output-content" contenteditable="true" placeholder="Hasil parafrase tulisan akademik Anda akan muncul di sini..."></div>
                            <div id="analysisBox" class="analysis-box hidden">
                                <div class="analysis-item">
                                    <label>Tingkat Kemiripan</label>
                                    <div class="score-container">
                                        <span id="simScore" class="val">0%</span>
                                        <small>Semakin rendah persentase, semakin besar perubahan struktur kalimat.</small>
                                    </div>
                                </div>
                                <div class="analysis-item bg-divider"></div>
                                <div class="analysis-item">
                                    <label>Jumlah Kata</label>
                                    <span id="outWordCount" class="val">-</span>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            </div>

            <section class="card history-card">
                <div class="card-header">
                    <h3><i class="fas fa-history text-muted"></i> Riwayat Aktivitas</h3>
                    <button id="clearHistory" class="btn-text">Hapus</button>
                </div>
                <div id="historyList"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
